name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint · Type-check · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Placeholder values so prisma generate + next build succeed
      # without real secrets. Production env vars live on Vercel.
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      AUTH_SECRET: ci-secret-only
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
